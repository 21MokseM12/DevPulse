openapi: 3.0.3
info:
  title: Bot Service API
  version: 1.0.0
  description: |
    REST API сервиса bot для управления клиентами, подписками и приема уведомлений от scrapper.
servers:
  - url: http://localhost:8080
    description: Local environment

tags:
  - name: Clients
    description: Регистрация и удаление клиента
  - name: Links
    description: Управление подписками на ссылки
  - name: Updates
    description: Входящие уведомления от scrapper

paths:
  /api/v1/clients:
    post:
      tags: [Clients]
      operationId: registerClient
      summary: Зарегистрировать клиента
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClientCredentialsRequest'
      responses:
        '200':
          description: Клиент успешно зарегистрирован
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BotApiMessageResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
    delete:
      tags: [Clients]
      operationId: unregisterClient
      summary: Удалить клиента
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClientCredentialsRequest'
      responses:
        '200':
          description: Клиент успешно удален
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BotApiMessageResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/v1/links:
    get:
      tags: [Links]
      operationId: getLinks
      summary: Получить список отслеживаемых ссылок
      parameters:
        - $ref: '#/components/parameters/ClientLoginHeader'
      responses:
        '200':
          description: Список ссылок
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/LinkResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
    post:
      tags: [Links]
      operationId: trackLink
      summary: Подписаться на ссылку
      parameters:
        - $ref: '#/components/parameters/ClientLoginHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddLinkRequest'
      responses:
        '200':
          description: Подписка создана
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LinkResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
    delete:
      tags: [Links]
      operationId: untrackLink
      summary: Отписаться от ссылки
      parameters:
        - $ref: '#/components/parameters/ClientLoginHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RemoveLinkRequest'
      responses:
        '200':
          description: Подписка удалена
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BotApiMessageResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /updates:
    post:
      tags: [Updates]
      operationId: notifyLinkUpdate
      summary: Принять уведомление об обновлении ссылки
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LinkUpdate'
      responses:
        '200':
          description: Уведомление принято
        '400':
          $ref: '#/components/responses/BadRequest'

components:
  parameters:
    ClientLoginHeader:
      name: Client-Login
      in: header
      required: true
      description: Логин клиента
      schema:
        type: string
        minLength: 1
    ClientPasswordHeader:
      name: Client-Password
      in: header
      required: true
      description: Пароль клиента
      schema:
        type: string
        minLength: 1

  responses:
    BadRequest:
      description: Некорректный запрос
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorResponse'

  schemas:
    ClientCredentialsRequest:
      type: object
      required: [login, password]
      properties:
        login:
          type: string
          minLength: 1
          example: alice
        password:
          type: string
          minLength: 1
          example: qwerty123

    BotApiMessageResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string
          example: Операция выполнена успешно

    AddLinkRequest:
      type: object
      required: [link]
      properties:
        link:
          type: string
          format: uri
          example: https://github.com/spring-projects/spring-framework
        tags:
          type: array
          items:
            type: string
          uniqueItems: true
          nullable: true
          example: [backend, work]
        filters:
          type: array
          items:
            type: string
          uniqueItems: true
          nullable: true
          example: [author:octocat]

    RemoveLinkRequest:
      type: object
      required: [link]
      properties:
        link:
          type: string
          format: uri
          example: https://stackoverflow.com/questions/12345678/example

    LinkResponse:
      type: object
      required: [id, url]
      properties:
        id:
          type: integer
          format: int64
          example: 42
        url:
          type: string
          format: uri
          example: https://github.com/spring-projects/spring-framework
        tags:
          type: array
          items:
            type: string
          uniqueItems: true
          nullable: true
          example: [backend]
        filters:
          type: array
          items:
            type: string
          uniqueItems: true
          nullable: true
          example: [author:octocat]

    LinkUpdate:
      type: object
      required: [id, url, title, updateOwner, description, creationDate, clientsIds]
      properties:
        id:
          type: integer
          format: int64
          example: 101
        url:
          type: string
          format: uri
          example: https://github.com/spring-projects/spring-framework/pull/1
        title:
          type: string
          example: New issue created
        updateOwner:
          type: string
          example: octocat
        description:
          type: string
          example: Краткое описание обновления
        creationDate:
          type: string
          format: date-time
          example: '2026-04-05T10:00:00Z'
        clientsIds:
          type: array
          items:
            type: integer
            format: int64
          example: [1001, 1002]

    ApiErrorResponse:
      type: object
      required:
        - description
        - code
        - exceptionName
        - exceptionMessage
        - stacktrace
      properties:
        description:
          type: string
          example: Bad request
        code:
          type: string
          example: '400'
        exceptionName:
          type: string
          example: BadRequestException
        exceptionMessage:
          type: string
          example: Некорректные параметры запроса
        stacktrace:
          type: array
          items:
            type: string
