openapi: 3.0.3
info:
  title: Scrapper HTTP API
  version: 1.1.0
  description: |
    HTTP-контракт микросервиса scrapper для управления клиентами и подписками на ссылки.
servers:
  - url: http://localhost:8081
    description: Local environment
tags:
  - name: Clients
    description: Операции регистрации/удаления клиента
  - name: Links
    description: Операции управления подписками на ссылки
paths:
  /clients:
    post:
      tags: [Clients]
      operationId: registerClient
      summary: Зарегистрировать клиента
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClientCredentialsRequest'
      responses:
        '200':
          description: Клиент успешно зарегистрирован
        '400':
          $ref: '#/components/responses/BadRequest'
    delete:
      tags: [Clients]
      operationId: unregisterClient
      summary: Удалить клиента
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClientCredentialsRequest'
      responses:
        '200':
          description: Клиент успешно удален
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
  /links:
    get:
      tags: [Links]
      operationId: getTrackedLinks
      summary: Получить список отслеживаемых ссылок
      parameters:
        - $ref: '#/components/parameters/ClientLoginHeader'
      responses:
        '200':
          description: Ссылки успешно получены
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/LinkResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags: [Links]
      operationId: addTrackedLink
      summary: Добавить подписку на ссылку
      parameters:
        - $ref: '#/components/parameters/ClientLoginHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddLinkRequest'
      responses:
        '200':
          description: Подписка на ссылку создана
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LinkResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Links]
      operationId: removeTrackedLink
      summary: Удалить подписку на ссылку
      parameters:
        - $ref: '#/components/parameters/ClientLoginHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RemoveLinkRequest'
      responses:
        '200':
          description: Подписка на ссылку удалена
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LinkResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  parameters:
    ClientLoginHeader:
      name: Client-Login
      in: header
      required: true
      description: Логин клиента
      schema:
        type: string
        minLength: 1

  responses:
    BadRequest:
      description: Некорректный запрос
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorResponse'
    NotFound:
      description: Ресурс не найден
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorResponse'

  schemas:
    ClientCredentialsRequest:
      type: object
      required: [login, password]
      properties:
        login:
          type: string
          minLength: 1
          example: alice
        password:
          type: string
          minLength: 1
          example: qwerty123

    AddLinkRequest:
      type: object
      required: [link]
      properties:
        link:
          type: string
          format: uri
          example: https://github.com/spring-projects/spring-framework
        tags:
          type: array
          items:
            type: string
          uniqueItems: true
          nullable: true
          example: [backend, work]
        filters:
          type: array
          items:
            type: string
          uniqueItems: true
          nullable: true
          example: [author:octocat, label:bug]

    RemoveLinkRequest:
      type: object
      required: [link]
      properties:
        link:
          type: string
          format: uri
          example: https://stackoverflow.com/questions/12345678/example

    LinkResponse:
      type: object
      required: [id, url]
      properties:
        id:
          type: integer
          format: int64
          example: 42
        url:
          type: string
          format: uri
          example: https://github.com/spring-projects/spring-framework
        tags:
          type: array
          items:
            type: string
          uniqueItems: true
          nullable: true
          example: [backend, work]
        filters:
          type: array
          items:
            type: string
          uniqueItems: true
          nullable: true
          example: [author:octocat]

    ApiErrorResponse:
      type: object
      required:
        - description
        - code
        - exceptionName
        - exceptionMessage
        - stacktrace
      properties:
        description:
          type: string
          example: Bad request
        code:
          type: string
          example: '400'
        exceptionName:
          type: string
          example: BadRequestException
        exceptionMessage:
          type: string
          example: Некорректные параметры запроса
        stacktrace:
          type: array
          items:
            type: string
